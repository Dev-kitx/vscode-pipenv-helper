name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        type: choice
        required: true
        default: first
        options:
          - first      # publish current package.json version (e.g., 0.0.1)
          - bump       # bump version then publish
      bump:
        description: "Version bump (used only when release_mode=bump)"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      create_github_release:
        description: "Create GitHub Release + mark latest"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for tags

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run checks before publishing
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump version + tag (creates vX.Y.Z)
      - name: Bump version (commit + tag)
        if: ${{ inputs.release_mode == 'bump' }}
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): v%s"

      # For first release (no bump), create tag v<current package.json version>
      - name: Tag current version (no bump)
        if: ${{ inputs.release_mode == 'first' }}
        shell: bash
        run: |
          VER="$(node -p "require('./package.json').version")"
          TAG="v$VER"
          echo "Tagging current version: $TAG"
          # fail if tag already exists
          git rev-parse "$TAG" >/dev/null 2>&1 && { echo "Tag $TAG already exists"; exit 1; }
          git tag "$TAG" -m "$TAG"
 
      - name: Bundle
        run: npm run bundle

      # Package VSIX (optional but nice)
      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Get VSIX filename
        id: vsix
        shell: bash
        run: |
          VSIX="$(ls -1 *.vsix | head -n 1)"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"
          echo "VSIX: $VSIX"

      # Publish EXACT package (ensures the thing you tested is what you ship)
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.vsix }}"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Push commit + tag only AFTER publish succeeded
      - name: Push commit + tags
        run: |
          git push origin HEAD
          git push origin --tags

      # Optional: create GitHub Release and upload VSIX
      - name: Create GitHub Release (latest) + upload VSIX
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          gh release create "$TAG" \
            --generate-notes \
            --latest \
            "${{ steps.vsix.outputs.vsix }}"
